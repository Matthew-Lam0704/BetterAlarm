<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>SilentAlarm</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#3c83f6",
            "background-light": "#f5f7f8",
            "background-dark": "#101722",
          },
          fontFamily: {
            "display": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .material-symbols-fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { min-height: max(884px, 100dvh); }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
  <div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto border-x border-slate-200 dark:border-slate-800 shadow-2xl">
    <!-- Header (context-aware) -->
    <header id="header" class="sticky top-0 z-10 flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-6 justify-between border-b border-slate-200 dark:border-slate-800">
      <div class="flex flex-col">
        <h1 class="text-2xl font-bold leading-tight tracking-tight text-slate-900 dark:text-white">SilentAlarm</h1>
        <p id="header-subtitle" class="text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-widest mt-1">Next: 07:30 AM</p>
      </div>
      <button id="header-action" class="flex items-center justify-center rounded-full size-12 bg-primary text-white shadow-lg shadow-primary/20 hover:scale-105 active:scale-95 transition-transform" aria-label="Add alarm">
        <span class="material-symbols-outlined text-3xl">add</span>
      </button>
    </header>

    <!-- Main Content (pages render here) -->
    <main id="main" class="flex-1 overflow-y-auto px-4 py-6">
      <!-- Pages loaded dynamically -->
    </main>

    <!-- Bottom Navigation -->
    <nav class="flex border-t border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-6 pb-6 pt-3">
      <a href="#alarms" data-page="alarms" class="nav-link flex flex-1 flex-col items-center justify-center gap-1 text-primary">
        <span class="material-symbols-outlined material-symbols-fill text-2xl">alarm</span>
        <p class="text-[10px] font-bold uppercase tracking-wider">Alarms</p>
      </a>
      <a href="#sleep" data-page="sleep" class="nav-link flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">bedtime</span>
        <p class="text-[10px] font-bold uppercase tracking-wider">Sleep</p>
      </a>
      <a href="#stats" data-page="stats" class="nav-link flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">bar_chart</span>
        <p class="text-[10px] font-bold uppercase tracking-wider">Stats</p>
      </a>
      <a href="#settings" data-page="settings" class="nav-link flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">settings</span>
        <p class="text-[10px] font-bold uppercase tracking-wider">Settings</p>
      </a>
    </nav>
  </div>

  <!-- Modal for adding alarm -->
  <div id="add-alarm-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 mx-4 w-full max-w-sm shadow-2xl">
      <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-4">Add Alarm</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-2">Time</label>
          <input type="time" id="new-alarm-time" value="07:00" class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 px-4 py-2 text-slate-900 dark:text-white"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-2">Label</label>
          <input type="text" id="new-alarm-label" placeholder="Wake up" class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 px-4 py-2 text-slate-900 dark:text-white placeholder-slate-500"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-2">Repeat</label>
          <select id="new-alarm-repeat" class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 px-4 py-2 text-slate-900 dark:text-white">
            <option value="weekdays">Mon - Fri</option>
            <option value="weekends">Sat, Sun</option>
            <option value="wednesday">Wednesday</option>
            <option value="everyday">Every day</option>
          </select>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button id="modal-cancel" class="flex-1 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 font-medium">Cancel</button>
        <button id="modal-save" class="flex-1 py-2 rounded-lg bg-primary text-white font-medium">Save</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
